<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <div class="form-header">
    <div class="header-text">
      <h1>Application for Student Admission</h1>
      <p>Please fill all fields clearly in CAPITAL LETTERS</p>
    </div>
    <img src="./images/tiny-images.jpg" alt="Logo" class="logo">
  </div>

  <hr class="header-line">

  <form id="admissionForm">

    <div class="section-heading">Student Details</div>

    <div class="student-top">
      <div class="student-fields">

        <div class="row">
          <label>Primary Branch</label>
          <div class="select-wrap">
            <select id="branch">
              <option value="">-- Select Branch --</option>
              <option>Saidapet</option>
             <option>Adambakkam</option>
             <option>Anna Nagar</option>
              <option>Ambattur</option>
              <option>Porur</option>
              <option>Ramapuram</option>
              <option>Velachery</option>
              <option>Mylapore</option>
              <option>Thiruvanmiyur</option>
              <option>KK Nagar</option>
              <option>Egmore</option>
              <option>Sholinganallur</option>
              <option>Chromepet</option>
              <option>Pallavaram</option>
              <option>Medavakkam</option>
              <option>East Tambaram</option>
              <option>Avadi</option>
              <option>Mogappair</option>
              <option>West Tambaram</option>
              <option>West Mambalam</option>
              <option>Poonamallee</option>
              <option>Perambur</option>
              <option>Thoraipakkam</option>
              <option>Ayanavaram</option>
              <option>Choolaimedu</option>
              <option>Iyyappanthangal</option>
              <option>Kodungaiyur</option>
              <option>Kundrathur</option>
              <option>Manndai</option>
              <option>Padur</option>
              <option>Palavakkam</option>
              <option>Other</option>
            </select>
          </div>
          <span class="field-error" id="branch-err"></span>
        </div>

        <div class="row">
          <label>Student Name</label>
          <span class="password-wrap">
            <input type="text" id="studentName">
          </span>
          <span class="field-error" id="studentName-err"></span>
        </div>

        <div class="row">
          <label>Gender</label>
          <div class="select-wrap">
            <select id="gender">
              <option value="">-- Select --</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
          <span class="field-error" id="gender-err"></span>
        </div>

        <div class="row">
          <label>Date of Birth</label>
          <div class="date-wrap">
            <input type="hidden" id="dob">
            <div class="custom-date-field" id="dob-display">
              <svg class="cal-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#4f9cf9" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span class="date-display-text">Select date</span>
              <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="custom-calendar" id="dob-cal">
              <div class="cal-header">
                <button type="button" class="cal-nav" data-dir="-1">&#8249;</button>
                <div class="cal-title-wrap">
                  <span class="cal-month-label"></span>
                  <span class="cal-year-label"></span>
                </div>
                <button type="button" class="cal-nav" data-dir="1">&#8250;</button>
              </div>
              <div class="cal-month-picker"></div>
              <div class="cal-year-picker"></div>
              <div class="cal-weekdays">
                <span>Su</span><span>Mo</span><span>Tu</span><span>We</span>
                <span>Th</span><span>Fr</span><span>Sa</span>
              </div>
              <div class="cal-days"></div>
              <div class="cal-footer">
                <button type="button" class="cal-today-btn">Today</button>
                <button type="button" class="cal-clear-btn">Clear</button>
              </div>
            </div>
          </div>
          <span class="field-error" id="dob-err"></span>
        </div>

        <div class="row">
          <label>Religion</label>
          <div class="select-wrap">
            <select id="religion">
              <option value="">-- Select --</option>
              <option>Hindu</option>
              <option>Christian</option>
              <option>Muslim</option>
              <option>Sikh</option>
              <option>Buddhist</option>
              <option>Jain</option>
              <option>Other</option>
            </select>
          </div>
          <span class="field-error" id="religion-err"></span>
        </div>

        <div class="row">
          <label>Referral Type</label>
          <input type="text" id="referralType">
          <span class="field-error" id="referralType-err"></span>
        </div>

        <div class="row">
          <label>Admission Date</label>
          <div class="date-wrap">
            <input type="hidden" id="admissionDate">
            <div class="custom-date-field" id="admissionDate-display">
              <svg class="cal-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#4f9cf9" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span class="date-display-text">Select date</span>
              <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2.5">
                <polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="custom-calendar" id="admissionDate-cal">
              <div class="cal-header">
                <button type="button" class="cal-nav" data-dir="-1">&#8249;</button>
                <div class="cal-title-wrap">
                  <span class="cal-month-label"></span>
                  <span class="cal-year-label"></span>
                </div>
                <button type="button" class="cal-nav" data-dir="1">&#8250;</button>
              </div>
              <div class="cal-month-picker"></div>
              <div class="cal-year-picker"></div>
              <div class="cal-weekdays">
                <span>Su</span>
                <span>Mo</span>
                <span>Tu</span>
                <span>We</span>
                <span>Th</span>
                <span>Fr</span>
                <span>Sa</span>
              </div>
              <div class="cal-days"></div>
              <div class="cal-footer">
                <button type="button" class="cal-today-btn">Today</button>
                <button type="button" class="cal-clear-btn">Clear</button>
              </div>
            </div>
          </div>
          <span class="field-error" id="admissionDate-err"></span>
        </div>

        <div class="row">
          <label>Email ID</label>
          <input type="text" id="email" placeholder="example@mail.com">
          <span id="emailError" class="field-error"></span>
        </div>

        <div class="row">
          <label>Password</label>
          <span class="password-wrap">
            <input type="password" id="password">
            <button type="button" id="toggleBtn" class="eye-btn" title="Show/Hide Password"></button>
          </span>
          <span class="field-error" id="password-err"></span>
        </div>

      </div>


      <div class="photo-col">
        <div class="photo-box" id="photoBox">
       
          <svg class="camera-svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="#4f9cf9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p id="photoPlaceholder">Affix photo here</p>
          <label for="photoInput" class="upload-btn">Choose Photo</label>
          <input type="file" id="photoInput" accept="image/*" style="display:none;">
        </div>
        <div id="photoPreviewBox" class="photo-preview-box" style="display:none;">
          <img id="photoPreviewLarge" src="" alt="Uploaded Photo">
          <div class="photo-preview-info">
            <div class="photo-check">&#10003; Photo uploaded</div>
            <span id="photoFileName"></span>
            <div class="photo-action-btns">
              <button type="button" id="photoViewBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>View
              </button>
              <button type="button" id="photoRemoveBtn">&#10005; Remove</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-heading">Parents Details</div>

    <div class="row">
      <label>Father's Name</label>
      <input type="text" id="fatherName">
      <span class="field-error" id="fatherName-err"></span>
    </div>
    <div class="row">
      <label>Father's Phone</label>
      <input type="tel" id="fatherPhone" maxlength="10" placeholder="10-digit Indian mobile" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <span class="field-error" id="fatherPhone-err"></span>
    </div>
<div class="row">
  <label>Father's Occupation</label>
  <input type="text" id="fatherOccupation">
  <span class="field-error" id="fatherOccupation-err"></span>
</div>
    <div class="row">
      <label>Mother's Name</label>
      <input type="text" id="motherName">
      <span class="field-error" id="motherName-err"></span>
    </div>
    <div class="row">
      <label>Mother's Phone</label>
      <input type="tel" id="motherPhone" maxlength="10" placeholder="10-digit Indian mobile" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <span class="field-error" id="motherPhone-err"></span>
    </div>
    <div class="row">
  <label>Mother's Occupation</label>
  <input type="text" id="motherOccupation">
  <span class="field-error" id="motherOccupation-err"></span>
</div>

    <div class="section-heading">School Details</div>

    <div class="row">
      <label>School Status</label>
      <span class="radio-group">
        <label class="radio-label"><input type="radio" name="schoolStatus" value="notGoing"> Not Going</label>
        <label class="radio-label"><input type="radio" name="schoolStatus" value="going"> Going</label>
      </span>
    </div>

    <div id="schoolFields" style="display:none;">
      <div class="row">
        <label>School Name</label>
        <input type="text" id="schoolName">
        <span class="field-error" id="schoolName-err"></span>
      </div>
      <div class="row">
        <label>Standard / Section</label>
        <input type="text" id="schoolStandard">
        <span class="field-error" id="schoolStandard-err"></span>
      </div>
      <div class="row">
        <label>School Address</label>
        <input type="text" id="schoolAddress">
        <span class="field-error" id="schoolAddress-err"></span>
      </div>
    </div>

    <div class="section-heading">Address Details</div>

    <div class="address-row">
      <div class="address-block">
        <label>Current Address</label>
        <textarea id="currentAddress" rows="4"></textarea>
        <span class="field-error" id="currentAddress-err"></span>
      </div>
      <div class="address-block">
        <label>Permanent Address</label>
        <textarea id="permanentAddress" rows="4"></textarea>
        <span class="field-error" id="permanentAddress-err"></span>
      </div>
    </div>


    <div class="section-heading">Guardian Details</div>

    <div class="row">
  <label>Guardian Name</label>
  <input type="text" id="guardianName">
  <span class="field-error" id="guardianName-err"></span>
</div>
    <div class="row">
      <label>Relationship</label>
      <input type="text" id="guardianRelation">
      <span class="field-error" id="guardianRelation-err"></span>
    </div>
    <div class="row">
      <label>Guardian Phone</label>
      <input type="tel" id="guardianPhone" maxlength="10" placeholder="10-digit Indian mobile" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <span class="field-error" id="guardianPhone-err"></span>
    </div>
    <div class="row full-row">
      <label>Guardian Address</label>
      <input type="text" id="guardianAddress">
      <span class="field-error" id="guardianAddress-err"></span>
    </div>

    <div class="submit-row">
      <button type="submit">Submit Application</button>
    </div>

  </form>
</div>

<div class="lightbox-overlay" id="imgLightbox">
  <button class="lightbox-close" id="lightboxClose">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <div class="lightbox-controls" id="lightboxControls">
    <button type="button" id="lbZoomIn" title="Zoom In">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <button type="button" id="lbZoomOut" title="Zoom Out">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
    <button type="button" id="lbRotate" title="Rotate">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
  <img id="lightboxImg" src="" alt="Preview">
</div>

<script src="script.js"></script>
</body>
</html>
